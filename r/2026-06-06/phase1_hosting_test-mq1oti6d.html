<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Phase1 Hosting Test - Graphify</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #5865f2;
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --text: #e2e5ef;
    --muted: #8b90a0;
    --radius: 14px;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    padding: 16px;
    max-width: 640px;
    margin: 0 auto;
  }
  .badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  h1 {
    font-size: clamp(18px, 4vw, 24px);
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .channel {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 14px;
  }
  .yt-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #ff0000;
    color: #fff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 8px;
    margin-bottom: 20px;
  }
  .hero {
    position: relative;
    display: block;
    width: 100%;
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 16px;
    border: 1px solid var(--surface2);
    background: var(--surface);
    line-height: 0;
  }
  .hero img { display: block; width: 100%; height: auto; }
  .hero .play {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(transparent 55%, rgba(0,0,0,.55)); pointer-events: none;
  }
  .hero .play span {
    background: #ff0000; color: #fff; width: 64px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    box-shadow: 0 6px 24px rgba(0,0,0,.4); line-height: 1;
  }
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
    border-left: 4px solid var(--accent);
  }
  .card-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .tldr {
    font-size: 16px;
    line-height: 1.7;
  }
  ul, ol {
    padding-left: 18px;
  }
  li {
    margin-bottom: 8px;
    font-size: 14px;
  }
  a {
    color: var(--accent);
    word-break: break-all;
  }
  .footer {
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    margin-top: 20px;
    padding-top: 12px;
    border-top: 1px solid var(--surface2);
  }
</style>
</head>
